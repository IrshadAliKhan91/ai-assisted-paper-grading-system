<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairMark — AI Grading System</title>
    <meta name="description" content="FairMark AI-based paper checking system. Grade student answers intelligently with core fact verification.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-card-hover: #ffffff;
            --bg-input: #f1f5f9;
            --border: #e2e8f0;
            --border-focus: #818cf8;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.15);
            --accent-hover: #4338ca;
            --success: #059669;
            --success-glow: rgba(5, 150, 105, 0.1);
            --warning: #d97706;
            --danger: #dc2626;
            --gradient-1: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --gradient-2: linear-gradient(135deg, #e2e8f0 0%, #f8fafc 100%);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.08);
            --shadow-glow: 0 0 30px rgba(79, 70, 229, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gradient-2);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-particles::before,
        .bg-particles::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s ease-in-out infinite;
        }
        .bg-particles::before {
            width: 600px; height: 600px;
            background: rgba(99, 102, 241, 0.06);
            top: -200px; right: -200px;
        }
        .bg-particles::after {
            width: 500px; height: 500px;
            background: rgba(168, 85, 247, 0.04);
            bottom: -200px; left: -100px;
            animation-delay: -10s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Header */
        .header {
            position: relative;
            z-index: 10;
            padding: 28px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.8);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo-icon {
            width: 42px; height: 42px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }
        .logo-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo-text span {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-badge {
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            font-size: 12px;
            font-weight: 500;
            color: var(--accent-hover);
            letter-spacing: 0.5px;
        }

        /* Main Layout */
        .main-container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 36px 40px 60px;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 32px;
        }

        @media (max-width: 1100px) {
            .main-container {
                grid-template-columns: 1fr;
                padding: 24px 20px 40px;
            }
        }

        /* Card Styles */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            border-color: rgba(99, 102, 241, 0.2);
            box-shadow: var(--shadow-glow);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        .card-subtitle {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 22px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .form-label .required {
            color: var(--danger);
            margin-left: 2px;
        }
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s ease;
            outline: none;
        }
        .form-input:focus,
        .form-textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-muted);
        }
        .form-textarea {
            resize: vertical;
            min-height: 90px;
            line-height: 1.6;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.2px;
        }
        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: rgba(75, 85, 99, 0.2);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: rgba(75, 85, 99, 0.3);
            color: var(--text-primary);
        }
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        /* Loading spinner on button */
        .btn .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .btn.loading .spinner { display: block; }
        .btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result Panel */
        .result-panel {
            position: sticky;
            top: 36px;
        }

        .score-display {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 24px;
        }
        .score-circle {
            width: 160px; height: 160px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: var(--bg-card);
            border: 3px solid var(--border);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .score-circle.scored {
            border-color: var(--accent);
            box-shadow: 0 0 40px var(--accent-glow), inset 0 0 30px rgba(99, 102, 241, 0.05);
        }
        .score-circle.high { border-color: var(--success); box-shadow: 0 0 40px var(--success-glow); }
        .score-circle.mid { border-color: var(--warning); box-shadow: 0 0 40px rgba(245, 158, 11, 0.2); }
        .score-circle.low { border-color: var(--danger); box-shadow: 0 0 40px rgba(239, 68, 68, 0.2); }

        .score-value {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
            color: var(--text-muted);
            transition: color 0.4s ease;
        }
        .score-circle.scored .score-value { color: var(--text-primary); }
        .score-circle.high .score-value { color: var(--success); }
        .score-circle.mid .score-value { color: var(--warning); }
        .score-circle.low .score-value { color: var(--danger); }

        .score-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .score-verdict {
            font-size: 15px;
            font-weight: 600;
            margin-top: 8px;
            color: var(--text-muted);
            transition: color 0.4s ease;
        }

        /* History */
        .history-section { margin-top: 8px; }
        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .history-header h3 {
            font-size: 15px;
            font-weight: 600;
        }
        .history-count {
            font-size: 12px;
            color: var(--text-muted);
            padding: 4px 10px;
            background: rgba(75, 85, 99, 0.2);
            border-radius: 10px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .history-list::-webkit-scrollbar {
            width: 4px;
        }
        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        .history-item {
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .history-item:hover {
            background: #ffffff;
            border-color: var(--accent);
        }
        .history-score {
            width: 42px; height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .history-score.high { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .history-score.mid { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .history-score.low { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .history-details {
            flex: 1;
            min-width: 0;
        }
        .history-question {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-answer {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-empty {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .toast.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        /* Entrance Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        /* Score change pop animation */
        @keyframes scorePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .score-pop { animation: scorePop 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div class="bg-particles"></div>

    <!-- Header -->
    <header class="header animate-in">
        <div class="logo">
            <div class="logo-text"><span>FairMark</span></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <!-- Left: Input Form -->
        <section class="card animate-in delay-1" id="input-section">
            <p class="card-subtitle">Enter the question, correct answer key, and the student's response.</p>

            <form id="grading-form">
                <div class="form-group">
                    <label class="form-label" for="question">Question</label>
                    <input type="text" class="form-input" id="question">
                </div>


                <div class="form-group">
                    <label class="form-label" for="key-answer">
                        Answer Key <span class="required">*</span>
                    </label>
                    <textarea class="form-textarea" id="key-answer" required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="student-answer">
                        Student's Answer <span class="required">*</span>
                    </label>
                    <textarea class="form-textarea" id="student-answer" required></textarea>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn btn-primary" id="grade-btn">
                        <span class="btn-text">Grade Answer</span>
                        <span class="spinner"></span>
                    </button>
                    <button type="button" class="btn btn-secondary" id="clear-btn">
                        Clear
                    </button>
                </div>
            </form>
        </section>

        <!-- Right: Results Panel -->
        <aside class="result-panel animate-in delay-2">
            <!-- Score Display -->
            <div class="card score-display" id="score-card">
                <div class="score-circle" id="score-circle">
                    <span class="score-value" id="score-value">—</span>
                    <span class="score-label">out of 10</span>
                </div>
                <div class="score-verdict" id="score-verdict">Awaiting evaluation...</div>
                <div id="feedback-text" style="margin-top: 15px; font-size: 13px; font-style: italic; color: var(--text-secondary); line-height: 1.4;"></div>
            </div>

            <!-- History -->
            <div class="card history-section animate-in delay-3">
                <div class="history-header">
                    <h3>History</h3>
                    <span class="history-count" id="history-count">0 evaluations</span>
                </div>
                <div class="history-list" id="history-list">
                    <div class="history-empty" id="history-empty">
                        No evaluations yet. Grade an answer to begin.
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  STATE
        // ============================================================
        const history = [];

        // ============================================================
        //  DOM REFS
        // ============================================================
        const form = document.getElementById('grading-form');
        const gradeBtn = document.getElementById('grade-btn');
        const clearBtn = document.getElementById('clear-btn');
        const questionInput = document.getElementById('question');
        const keyInput = document.getElementById('key-answer');
        const studentInput = document.getElementById('student-answer');
        const scoreCircle = document.getElementById('score-circle');
        const scoreValue = document.getElementById('score-value');
        const scoreVerdict = document.getElementById('score-verdict');
        const feedbackText = document.getElementById('feedback-text');
        const historyList = document.getElementById('history-list');
        const historyEmpty = document.getElementById('history-empty');
        const historyCount = document.getElementById('history-count');
        const toast = document.getElementById('toast');

        // ============================================================
        //  GRADING
        // ============================================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const question = questionInput.value.trim();
            const keyAnswer = keyInput.value.trim();
            const studentAnswer = studentInput.value.trim();

            if (!keyAnswer || !studentAnswer) {
                showToast('Please fill in both the answer key and student answer.', 'error');
                return;
            }

            gradeBtn.classList.add('loading');
            gradeBtn.disabled = true;

            try {
                const res = await fetch('/api/engine/grade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        key_answer: keyAnswer,
                        student_answer: studentAnswer,
                        api_key: '' // Key is now handled server-side via environment variable
                    }),
                });

                if (!res.ok) throw new Error('Grading failed');

                const data = await res.json();
                displayScore(data.marks, data.engine, data.feedback);
                addToHistory(data);
                showToast(`Evaluation complete using ${data.engine}`, 'success');

            } catch (err) {
                showToast('Error: Could not grade answer. Is the server running?', 'error');
                console.error(err);
            } finally {
                gradeBtn.classList.remove('loading');
                gradeBtn.disabled = false;
            }
        });

        clearBtn.addEventListener('click', () => {
            questionInput.value = '';
            keyInput.value = '';
            studentInput.value = '';
            questionInput.focus();
        });

        // ============================================================
        //  DISPLAY SCORE
        // ============================================================
        function displayScore(marks, engine = '', feedback = '') {
            scoreValue.textContent = marks;
            feedbackText.textContent = feedback;

            // Remove old classes
            scoreCircle.className = 'score-circle scored';
            if (marks >= 8) scoreCircle.classList.add('high');
            else if (marks >= 5) scoreCircle.classList.add('mid');
            else scoreCircle.classList.add('low');

            // Pop animation
            scoreCircle.classList.add('score-pop');
            setTimeout(() => scoreCircle.classList.remove('score-pop'), 400);

            // Verdict
            const verdicts = {
                10: 'Perfect Answer',
                9: 'Excellent',
                8: 'Very Good',
                7: 'Good',
                6: 'Above Average',
                5: 'Average',
                4: 'Below Average',
                3: 'Needs Improvement',
                2: 'Poor',
                1: 'Very Poor',
                0: 'No Match',
            };
            scoreVerdict.textContent = verdicts[marks] || '—';
            scoreVerdict.style.color = marks >= 8 ? 'var(--success)' :
                                        marks >= 5 ? 'var(--warning)' : 'var(--danger)';
        }

        // ============================================================
        //  HISTORY
        // ============================================================
        function addToHistory(data) {
            history.unshift(data);
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historyEmpty.style.display = 'block';
                historyCount.textContent = '0 evaluations';
                return;
            }

            historyEmpty.style.display = 'none';
            historyCount.textContent = `${history.length} evaluation${history.length > 1 ? 's' : ''}`;
            
            historyList.innerHTML = '';
            history.forEach(item => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                
                let scoreClass = 'low';
                if (item.marks >= 8) scoreClass = 'high';
                else if (item.marks >= 5) scoreClass = 'mid';

                historyItem.innerHTML = `
                    <div class="history-score ${scoreClass}">${item.marks}</div>
                    <div class="history-details">
                        <div class="history-question">${item.question || 'No Question'}</div>
                        <div class="history-answer">${item.student_answer}</div>
                    </div>
                `;

                historyItem.addEventListener('click', () => {
                    questionInput.value = item.question || '';
                    keyInput.value = item.key_answer;
                    studentInput.value = item.student_answer;
                    displayScore(item.marks, item.engine, item.feedback);
                });

                historyList.appendChild(historyItem);
            });
        }

        // ============================================================
        //  TOAST
        // ============================================================
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
